syntax = "proto3";

package magicbox.creator.v1;

option java_package = "kr.magicbox.shortform.grpc.creator";
option java_outer_classname = "CreatorServiceProto";
option java_multiple_files = true;

service CreatorService {
  rpc GetCreatorIdByUserId(GetCreatorIdByUserIdRequest) returns (GetCreatorIdByUserIdResponse);
  rpc GetCreatorNicknameByCreatorId(GetCreatorNicknameByCreatorIdRequest) returns (GetCreatorNicknameByCreatorIdResponse);
  rpc GetCreatorProfileByCreatorId(GetCreatorProfileByCreatorIdRequest) returns (GetCreatorProfileByCreatorIdResponse);
  rpc GetCreatorProfilesBatch(GetCreatorProfilesBatchRequest) returns (GetCreatorProfilesBatchResponse);
}

message GetCreatorIdByUserIdRequest {
  int64 user_id = 1;
}

message GetCreatorIdByUserIdResponse {
  int64 creator_id = 1;
}

message GetCreatorNicknameByCreatorIdRequest {
  int64 creator_id = 1;
}

message GetCreatorNicknameByCreatorIdResponse {
  string nickname = 1;
}

message GetCreatorProfileByCreatorIdRequest {
  int64 creator_id = 1;
}

message GetCreatorProfileByCreatorIdResponse {
  int64 creator_id = 1;
  string nickname = 2;
  string profile_image_url = 3;
}

message GetCreatorProfilesBatchRequest {
  repeated int64 creator_ids = 1;
}

message GetCreatorProfilesBatchResponse {
  repeated GetCreatorProfileByCreatorIdResponse profiles = 1;
}
