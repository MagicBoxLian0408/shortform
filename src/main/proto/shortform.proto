syntax = "proto3";

package magicbox.shortform.v1;

option java_package = "kr.magicbox.shortform.grpc.shortform";
option java_outer_classname = "ShortformServiceProto";
option java_multiple_files = true;

import "google/protobuf/timestamp.proto";

service ShortformService {
  rpc GetShortformsByCreatorId(GetShortformsByCreatorIdRequest) returns (GetShortformsByCreatorIdResponse);
}

message GetShortformsByCreatorIdRequest {
  int64 creator_id = 1;
}

message GetShortformsByCreatorIdResponse {
  repeated Shortform shortforms = 1;
}

message Shortform {
  int64 shortform_id = 1;
  string title = 2;
  string thumbnail_uuid = 3;
  string video_uuid = 4;
  int64 view_count = 5;
  google.protobuf.Timestamp created_at = 6;
}
